openapi: 3.1.0
info:
  title: RiDERgy Energy Management API
  version: "1.0"
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    Contrôle programmatique des limites de puissance de charge sur les sites,
    les bornes individuelles, les organisations et les clusters multi-sites.

    ## Authentification
    Tous les endpoints sauf `GET /health` nécessitent un en-tête `x-api-key`. Cette
    clé détermine votre tenant — elle n'est jamais lue depuis le corps de la
    requête ni depuis un autre en-tête, ainsi une clé d'un tenant ne peut pas
    accéder aux données d'un autre tenant.

    Votre tenant doit avoir la fonctionnalité Energy Management API activée,
    sinon les requêtes échouent avec `403 FEATURE_NOT_ENABLED`. Contactez RiDERgy
    pour l'activer.

    ## Modèle de priorité
    Les limites de site et de borne sont contrôlées via des **profils à fenêtres
    de priorité** :

    - Les priorités vont de **0 (la plus basse) à 10 (la plus haute)**, dans le
      style de la pile OCPP.
    - Une cible (site ou connecteur de borne) peut avoir jusqu'à 11 profils, un
      par niveau de priorité, chacun avec sa propre fenêtre `[startTime, endTime)`.
    - À tout moment, la **limite effective** est le `limitKw` du profil de
      priorité la plus élevée dont la fenêtre est actuellement active.
    - Si aucun profil n'est actif, un site revient à son `permanentLimitKw`.
    - Soumettre un profil à une priorité qui en possède déjà un pour cette cible
      le **remplace**.
    - Une tâche cron toutes les 1 minute (`emLimitProcessor`) applique et annule
      automatiquement les profils à leurs `startTime`/`endTime` — aucun appel
      d'API supplémentaire n'est nécessaire. Les enregistrements de profils ne
      sont jamais supprimés, l'historique reste donc consultable.

    ## Erreurs
    Toutes les erreurs partagent cette forme :

    ```json
    {
      "error": {
        "code": "LOCATION_NOT_FOUND",
        "message": "Location 123 was not found for the provided tenant",
        "requestId": "b1f6e6b0-..."
      }
    }
    ```
servers:
  - url: https://api.ridergy.com/v1
    description: Production
security:
  - ApiKeyAuth: []

tags:
  - name: Health
    description: Vérification de l'état du service, sans authentification.
  - name: Locations
    description: Lire et définir les limites de puissance et les profils de priorité au niveau du site.
  - name: Chargers
    description: Verrouiller des connecteurs de borne individuels sur une limite de puissance fixe pour une fenêtre temporelle.
  - name: Organizations
    description: Profils de plafond à l'échelle du tenant (enregistrés uniquement — l'application n'est pas encore active).
  - name: Clusters
    description: Regrouper des sites sous un plafond kW partagé et appliquer des plannings à l'ensemble du groupe.

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      description: Vérification de l'état du service, sans authentification. Ne nécessite pas de clé API.
      security: []
      responses:
        "200":
          description: Le service est opérationnel
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /locations/{locationId}/schedules:
    post:
      tags: [Locations]
      summary: Create or replace a location priority limit profile
      operationId: createLocationSchedule
      description: |
        Crée un profil de limite de puissance à fenêtre temporelle pour un site,
        à la priorité indiquée. Si un profil existe déjà à cette priorité pour ce
        site, il est remplacé. La limite effective est recalculée immédiatement
        et appliquée au site.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitProfileRequest"
            examples:
              example:
                value:
                  startTime: "2026-06-12T08:00:00Z"
                  endTime: "2026-06-12T18:00:00Z"
                  limitKw: 50.0
                  priority: 5
      responses:
        "200":
          description: Profil créé/remplacé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationScheduleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          description: Site introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                locationNotFound:
                  value:
                    error:
                      code: LOCATION_NOT_FOUND
                      message: "Location 123 was not found for the provided tenant"
                      requestId: "b1f6e6b0-1234-4abc-9def-000000000000"

  /locations/{locationId}/limits:
    get:
      tags: [Locations]
      summary: Get a location's permanent limit and all priority profiles
      operationId: getLocationLimits
      description: |
        Renvoie la limite de repli permanente du site, la limite effective
        actuelle, et tous les profils de priorité (y compris ceux expirés et
        programmés) avec un `status` recalculé.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Limites du site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationLimitsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/LocationNotFound"

  /locations/{locationId}/limit:
    put:
      tags: [Locations]
      summary: Set a location's permanent (fallback) limit
      operationId: setLocationPermanentLimit
      description: |
        Définit la limite permanente utilisée lorsqu'aucun profil de priorité
        n'est actuellement actif pour ce site.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PermanentLimitRequest"
            examples:
              example:
                value:
                  limitKw: 100.0
      responses:
        "200":
          description: Limite permanente mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermanentLimitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/LocationNotFound"

  /chargers/{controllerUuid}/connectors/{connectorId}/schedules:
    post:
      tags: [Chargers]
      summary: Create or replace a charger-level limit lock
      operationId: createChargerSchedule
      description: |
        Crée un verrou de limite de puissance à fenêtre temporelle pour un seul
        connecteur.

        Pendant que la fenêtre est **ACTIVE**, `emLimitProcessor` marque ce
        connecteur comme verrouillé en priorité dans `charger_priority_prod`
        (`source=energy_management_api`). Le smart charging exclut alors ce
        connecteur du rééquilibrage normal — il fonctionne sans limitation
        jusqu'à `limitKw`, et n'est limité (jamais en dessous de son plancher
        de 6A) qu'en dernier recours si le site dépasse par ailleurs sa limite
        réseau.
      parameters:
        - $ref: "#/components/parameters/ControllerUuid"
        - $ref: "#/components/parameters/ConnectorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitProfileRequest"
            examples:
              example:
                value:
                  startTime: "2026-06-12T08:00:00Z"
                  endTime: "2026-06-12T18:00:00Z"
                  limitKw: 11.0
                  priority: 5
      responses:
        "200":
          description: Planning de borne créé/remplacé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorScheduleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          description: Borne/connecteur introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                chargerNotFound:
                  value:
                    error:
                      code: CHARGER_NOT_FOUND
                      message: "Connector <controllerUuid>/<connectorId> was not found for the provided tenant"
                      requestId: "b1f6e6b0-1234-4abc-9def-000000000000"

  /organizations/schedules:
    post:
      tags: [Organizations]
      summary: Create or replace an organization-wide cap profile
      operationId: createOrganizationSchedule
      description: |
        Enregistre un profil de plafond à l'échelle de l'organisation pour le
        tenant appelant (déterminé à partir de la clé API — aucun `orgId` dans
        le chemin ou le corps de la requête).

        > **Pas encore appliqué.** L'application du plafond à l'échelle de
        > l'organisation sur les sites du tenant n'est pas encore active
        > (Phase 3, différée). Les profils sont enregistrés pour une utilisation
        > future uniquement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitProfileRequest"
            examples:
              example:
                value:
                  startTime: "2026-06-12T08:00:00Z"
                  endTime: "2026-06-12T18:00:00Z"
                  limitKw: 500.0
                  priority: 5
      responses:
        "200":
          description: Profil d'organisation créé/remplacé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgScheduleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"

  /organizations/limits:
    get:
      tags: [Organizations]
      summary: List organization-wide cap profiles
      operationId: getOrganizationLimits
      description: |
        Liste tous les profils de plafond à l'échelle de l'organisation pour le
        tenant appelant, avec leur statut calculé.

        > **Pas encore appliqué** — voir `POST /organizations/schedules`.
      responses:
        "200":
          description: Profils de plafond de l'organisation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgLimitsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"

  /clusters:
    post:
      tags: [Clusters]
      summary: Create a cluster
      operationId: createCluster
      description: |
        Crée un cluster regroupant plusieurs sites sous un plafond kW optionnel
        unique. Tous les `locationIds` doivent appartenir au tenant appelant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterCreateRequest"
            examples:
              example:
                value:
                  name: "North Campus"
                  locationIds: ["3632155", "3632156"]
                  limitKw: 200.0
      responses:
        "201":
          description: Cluster créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cluster"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
    get:
      tags: [Clusters]
      summary: List clusters
      operationId: listClusters
      description: Liste tous les clusters du tenant appelant, du plus récent au plus ancien.
      responses:
        "200":
          description: Clusters
          content:
            application/json:
              schema:
                type: object
                properties:
                  clusters:
                    type: array
                    items:
                      $ref: "#/components/schemas/Cluster"
                  count:
                    type: integer
                    example: 2
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"

  /clusters/{clusterId}:
    get:
      tags: [Clusters]
      summary: Get a cluster's live status
      operationId: getCluster
      description: |
        Renvoie le cluster ainsi qu'un bloc `liveStatus` : la consommation kW
        totale réelle, la somme des limites des sites membres, et pour chaque
        site `{setLimitKw, effectiveLimitKw, actualKw}` après mise à l'échelle
        proportionnelle (`scale = min(1, clusterLimitKw / sumLocationLimits)`).
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Détail du cluster avec statut en direct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/ClusterNotFound"
    patch:
      tags: [Clusters]
      summary: Update a cluster
      operationId: updateCluster
      description: |
        Met à jour partiellement un cluster. N'importe lequel des champs
        `name`, `limitKw` (ou `null` pour supprimer le plafond),
        `locationIds`, ou `status` (`ACTIVE`/`INACTIVE`) peut être fourni.
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterPatchRequest"
            examples:
              example:
                value:
                  limitKw: 250.0
      responses:
        "200":
          description: Cluster mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cluster"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/ClusterNotFound"
    delete:
      tags: [Clusters]
      summary: Delete a cluster
      operationId: deleteCluster
      description: Supprime l'enregistrement du cluster. Les sites membres ne sont pas affectés.
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Cluster supprimé
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
                  clusterId:
                    type: string
                    example: "clst_20260612_a1b2c3d4"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/ClusterNotFound"

  /clusters/{clusterId}/schedules:
    post:
      tags: [Clusters]
      summary: Apply a schedule to every location in a cluster
      operationId: applyClusterSchedule
      description: |
        Applique le même `LimitProfileRequest` à chaque site du cluster
        (équivalent à appeler `POST /locations/{locationId}/schedules` pour
        chaque membre).
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitProfileRequest"
            examples:
              example:
                value:
                  startTime: "2026-06-12T08:00:00Z"
                  endTime: "2026-06-12T18:00:00Z"
                  limitKw: 50.0
                  priority: 5
      responses:
        "200":
          description: Planning appliqué à au moins un site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterScheduleResponse"
        "400":
          description: Le cluster est inactif, vide, ou le corps de la requête est invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                clusterInactive:
                  summary: CLUSTER_INACTIVE
                  value:
                    error:
                      code: CLUSTER_INACTIVE
                      message: "Cluster clst_20260612_a1b2c3d4 is inactive"
                      requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
                clusterEmpty:
                  summary: CLUSTER_EMPTY
                  value:
                    error:
                      code: CLUSTER_EMPTY
                      message: "Cluster has no locations"
                      requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/ClusterNotFound"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Clé API par tenant. Le tenant est déterminé à partir de la clé — jamais à partir de la requête.

  parameters:
    LocationId:
      name: locationId
      in: path
      required: true
      schema:
        type: string
      example: "3632155"
    ControllerUuid:
      name: controllerUuid
      in: path
      required: true
      schema:
        type: string
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    ConnectorId:
      name: connectorId
      in: path
      required: true
      schema:
        type: string
      example: "1"
    ClusterId:
      name: clusterId
      in: path
      required: true
      schema:
        type: string
      example: "clst_20260612_a1b2c3d4"

  schemas:
    LimitProfileRequest:
      type: object
      required: [startTime, endTime, limitKw]
      properties:
        startTime:
          type: string
          format: date-time
          description: Horodatage UTC ISO-8601. Obligatoire.
          example: "2026-06-12T08:00:00Z"
        endTime:
          type: string
          format: date-time
          description: Horodatage UTC ISO-8601. Doit être postérieur à `startTime` et dans le futur. Obligatoire.
          example: "2026-06-12T18:00:00Z"
        limitKw:
          type: number
          format: float
          exclusiveMinimum: 0
          description: Limite de puissance en kW. Doit être supérieure à 0. Obligatoire.
          example: 50.0
        priority:
          type: integer
          minimum: 0
          maximum: 10
          default: 0
          description: |
            Niveau de priorité dans le style de la pile OCPP, de 0 (la plus
            basse) à 10 (la plus haute). Soumettre un profil à une priorité qui
            existe déjà pour cette cible le remplace.
          example: 5

    PermanentLimitRequest:
      type: object
      required: [limitKw]
      properties:
        limitKw:
          type: number
          format: float
          exclusiveMinimum: 0
          example: 100.0

    ProfileStatus:
      type: string
      enum: [SCHEDULED, ACTIVE, EXPIRED]

    LocationScheduleResponse:
      type: object
      properties:
        locationId:
          type: string
          example: "3632155"
        priority:
          type: integer
          example: 5
        limitKw:
          type: number
          example: 50.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"
        permanentLimitKw:
          type:
            - number
            - "null"
          example: 100.0
        effectiveLimitKw:
          type:
            - number
            - "null"
          example: 50.0

    ProfileEntry:
      type: object
      properties:
        priority:
          type: integer
          example: 5
        limitKw:
          type: number
          example: 50.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"

    LocationLimitsResponse:
      type: object
      properties:
        locationId:
          type: string
          example: "3632155"
        permanentLimitKw:
          type:
            - number
            - "null"
          example: 100.0
        effectiveLimitKw:
          type:
            - number
            - "null"
          example: 50.0
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/ProfileEntry"

    PermanentLimitResponse:
      type: object
      properties:
        locationId:
          type: string
          example: "3632155"
        permanentLimitKw:
          type: number
          example: 100.0
        effectiveLimitKw:
          type:
            - number
            - "null"
          example: 100.0

    ConnectorScheduleResponse:
      type: object
      properties:
        controllerUuid:
          type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        connectorId:
          type: string
          example: "1"
        limitKw:
          type: number
          example: 11.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"

    OrgScheduleResponse:
      type: object
      properties:
        tenantUuid:
          type: string
        priority:
          type: integer
          example: 5
        limitKw:
          type: number
          example: 500.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"
        note:
          type: string
          example: "Organization-wide cap enforcement is not yet active; this profile is recorded for future use."

    OrgProfileEntry:
      type: object
      properties:
        priority:
          type: integer
          example: 5
        limitKw:
          type: number
          example: 500.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"

    OrgLimitsResponse:
      type: object
      properties:
        tenantUuid:
          type: string
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/OrgProfileEntry"
        note:
          type: string
          example: "Organization-wide cap enforcement is not yet active; this profile is recorded for future use."

    ClusterCreateRequest:
      type: object
      required: [name, locationIds]
      properties:
        name:
          type: string
          example: "North Campus"
        locationIds:
          type: array
          minItems: 1
          items:
            type: string
          example: ["3632155", "3632156"]
        limitKw:
          type:
            - number
            - "null"
          format: float
          exclusiveMinimum: 0
          description: Plafond kW optionnel pour le cluster.
          example: 200.0

    ClusterPatchRequest:
      type: object
      properties:
        name:
          type: string
          example: "North Campus"
        limitKw:
          type:
            - number
            - "null"
          description: Mettre à `null` pour supprimer le plafond du cluster.
          example: 250.0
        locationIds:
          type: array
          minItems: 1
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    Cluster:
      type: object
      properties:
        clusterId:
          type: string
          example: "clst_20260612_a1b2c3d4"
        tenantUuid:
          type: string
        name:
          type: string
          example: "North Campus"
        locationIds:
          type: array
          items:
            type: string
          example: ["3632155", "3632156"]
        limitKw:
          type:
            - number
            - "null"
          example: 200.0
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ClusterLocationStatus:
      type: object
      properties:
        locationId:
          type: string
          example: "3632155"
        setLimitKw:
          type: number
          example: 100.0
        effectiveLimitKw:
          type: number
          example: 80.0
        actualKw:
          type: number
          example: 65.4

    ClusterLiveStatus:
      type: object
      properties:
        actualTotalKw:
          type: number
          example: 130.8
        clusterLimitKw:
          type:
            - number
            - "null"
          example: 200.0
        sumLocationLimits:
          type: number
          example: 200.0
        withinLimit:
          type: boolean
          example: true
        locations:
          type: array
          items:
            $ref: "#/components/schemas/ClusterLocationStatus"

    ClusterDetail:
      allOf:
        - $ref: "#/components/schemas/Cluster"
        - type: object
          properties:
            liveStatus:
              $ref: "#/components/schemas/ClusterLiveStatus"

    ClusterScheduleResponse:
      type: object
      properties:
        clusterId:
          type: string
          example: "clst_20260612_a1b2c3d4"
        applied:
          type: array
          items:
            allOf:
              - type: object
                properties:
                  locationId:
                    type: string
              - $ref: "#/components/schemas/LocationScheduleResponse"
        errors:
          type: array
          items:
            type: object
            properties:
              locationId:
                type: string
              error:
                $ref: "#/components/schemas/Error"
        totalLocations:
          type: integer
          example: 2

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "LOCATION_NOT_FOUND"
            message:
              type: string
              example: "Location 123 was not found for the provided tenant"
            requestId:
              type: string
              format: uuid

  responses:
    BadRequest:
      description: Corps de requête invalide ou cible inactive
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            invalidBody:
              summary: INVALID_REQUEST_BODY
              value:
                error:
                  code: INVALID_REQUEST_BODY
                  message: "limitKw must be a positive number"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
            targetInactive:
              summary: TARGET_INACTIVE
              value:
                error:
                  code: TARGET_INACTIVE
                  message: "Location 123 is not active"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
    Unauthorized:
      description: Clé API manquante, invalide ou expirée
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            unauthorized:
              value:
                error:
                  code: UNAUTHORIZED
                  message: "Invalid or inactive API key"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
    FeatureNotEnabled:
      description: Le tenant n'a pas l'Energy Management API activée
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            featureNotEnabled:
              value:
                error:
                  code: FEATURE_NOT_ENABLED
                  message: "The Energy Management API is not enabled for your account. Contact RiDERgy to enable this feature."
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
    LocationNotFound:
      description: Site introuvable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            locationNotFound:
              value:
                error:
                  code: LOCATION_NOT_FOUND
                  message: "Location 123 was not found for the provided tenant"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
    ClusterNotFound:
      description: Cluster introuvable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            clusterNotFound:
              value:
                error:
                  code: CLUSTER_NOT_FOUND
                  message: "Cluster clst_20260612_a1b2c3d4 not found"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
