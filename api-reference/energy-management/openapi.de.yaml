openapi: 3.1.0
info:
  title: RiDERgy Energy Management API
  version: "1.0"
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    Programmatische Steuerung von Ladeleistungslimits über Standorte, einzelne
    Ladepunkte, Organisationen und standortübergreifende Cluster hinweg.

    ## Authentifizierung
    Jeder Endpunkt außer `GET /health` benötigt einen `x-api-key`-Header. Der
    Schlüssel bestimmt Ihren Mandanten — er wird nie aus dem Request-Body oder
    einem anderen Header gelesen, sodass ein Schlüssel eines Mandanten nicht
    auf die Daten eines anderen Mandanten zugreifen kann.

    Ihr Mandant muss das Feature der Energy Management API aktiviert haben,
    andernfalls schlagen Anfragen mit `403 FEATURE_NOT_ENABLED` fehl.
    Kontaktieren Sie RiDERgy, um es zu aktivieren.

    ## Prioritätsmodell
    Standort- und Ladepunkt-Limits werden über **prioritätsbasierte
    Zeitfenster-Profile** gesteuert:

    - Prioritäten reichen von **0 (niedrigste) bis 10 (höchste)**, im
      OCPP-Stack-Stil.
    - Ein Ziel (Standort oder Ladepunkt-Connector) kann bis zu 11 Profile
      haben, eines pro Prioritätsstufe, jeweils mit eigenem
      `[startTime, endTime)`-Zeitfenster.
    - Zu jedem Zeitpunkt ist das **effektive Limit** der `limitKw`-Wert des
      Profils mit der höchsten Priorität, dessen Zeitfenster gerade aktiv ist.
    - Ist kein Profil aktiv, fällt ein Standort auf sein `permanentLimitKw`
      zurück.
    - Wird ein Profil mit einer Priorität übermittelt, für die für dieses Ziel
      bereits eines existiert, wird dieses **ersetzt**.
    - Ein 1-minütiger Cron-Job (`emLimitProcessor`) wendet Profile automatisch
      zu ihrer `startTime`/`endTime` an und macht sie wieder rückgängig — es
      sind keine weiteren API-Aufrufe erforderlich. Profil-Datensätze werden
      nie gelöscht, sodass die Historie weiterhin abfragbar bleibt.

    ## Fehler
    Alle Fehler haben diese Form:

    ```json
    {
      "error": {
        "code": "LOCATION_NOT_FOUND",
        "message": "Location 123 was not found for the provided tenant",
        "requestId": "b1f6e6b0-..."
      }
    }
    ```
servers:
  - url: https://api.ridergy.com/v1
    description: Production
security:
  - ApiKeyAuth: []

tags:
  - name: Health
    description: Nicht authentifizierter Service-Health-Check.
  - name: Locations
    description: Lesen und Setzen von Leistungslimits und Prioritätsprofilen auf Standortebene.
  - name: Chargers
    description: Sperren einzelner Ladepunkt-Connectoren auf ein festes Leistungslimit für ein Zeitfenster.
  - name: Organizations
    description: Mandantenweite Cap-Profile (werden nur erfasst — Durchsetzung noch nicht aktiv).
  - name: Clusters
    description: Gruppierung von Standorten unter einem gemeinsamen kW-Limit und Anwendung von Zeitplänen über diese hinweg.

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      description: Nicht authentifizierter Health-Check. Erfordert keinen API-Schlüssel.
      security: []
      responses:
        "200":
          description: Service ist gesund
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /locations/{locationId}/schedules:
    post:
      tags: [Locations]
      summary: Create or replace a location priority limit profile
      operationId: createLocationSchedule
      description: |
        Erstellt ein zeitfensterbasiertes Leistungslimit-Profil für einen
        Standort mit der angegebenen Priorität. Existiert bereits ein Profil
        mit dieser Priorität für diesen Standort, wird es ersetzt. Das
        effektive Limit wird sofort neu berechnet und an den Standort
        durchgereicht.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitProfileRequest"
            examples:
              example:
                value:
                  startTime: "2026-06-12T08:00:00Z"
                  endTime: "2026-06-12T18:00:00Z"
                  limitKw: 50.0
                  priority: 5
      responses:
        "200":
          description: Profil erstellt/ersetzt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationScheduleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          description: Standort nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                locationNotFound:
                  value:
                    error:
                      code: LOCATION_NOT_FOUND
                      message: "Location 123 was not found for the provided tenant"
                      requestId: "b1f6e6b0-1234-4abc-9def-000000000000"

  /locations/{locationId}/limits:
    get:
      tags: [Locations]
      summary: Get a location's permanent limit and all priority profiles
      operationId: getLocationLimits
      description: |
        Gibt das permanente Fallback-Limit des Standorts, das aktuelle
        effektive Limit sowie alle Prioritätsprofile (einschließlich
        abgelaufener und geplanter) mit neu berechnetem `status` zurück.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: Standortlimits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationLimitsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/LocationNotFound"

  /locations/{locationId}/limit:
    put:
      tags: [Locations]
      summary: Set a location's permanent (fallback) limit
      operationId: setLocationPermanentLimit
      description: |
        Setzt das permanente Limit, das verwendet wird, wenn für diesen
        Standort aktuell kein Prioritätsprofil aktiv ist.
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PermanentLimitRequest"
            examples:
              example:
                value:
                  limitKw: 100.0
      responses:
        "200":
          description: Permanentes Limit aktualisiert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermanentLimitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/LocationNotFound"

  /chargers/{controllerUuid}/connectors/{connectorId}/schedules:
    post:
      tags: [Chargers]
      summary: Create or replace a charger-level limit lock
      operationId: createChargerSchedule
      description: |
        Erstellt eine zeitfensterbasierte Leistungslimit-Sperre für einen
        einzelnen Connector.

        Solange das Zeitfenster **ACTIVE** ist, markiert `emLimitProcessor`
        diesen Connector als prioritätsgesperrt in `charger_priority_prod`
        (`source=energy_management_api`). Smart Charging schließt diesen
        Connector dann von der normalen Neuverteilung aus — er läuft
        ungedrosselt bis zu `limitKw` und wird nur als letztes Mittel (nie
        unter sein 6A-Minimum) gedrosselt, falls der Standort sein Netzlimit
        ansonsten überschreitet.
      parameters:
        - $ref: "#/components/parameters/ControllerUuid"
        - $ref: "#/components/parameters/ConnectorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitProfileRequest"
            examples:
              example:
                value:
                  startTime: "2026-06-12T08:00:00Z"
                  endTime: "2026-06-12T18:00:00Z"
                  limitKw: 11.0
                  priority: 5
      responses:
        "200":
          description: Ladepunkt-Zeitplan erstellt/ersetzt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorScheduleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          description: Ladepunkt/Connector nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                chargerNotFound:
                  value:
                    error:
                      code: CHARGER_NOT_FOUND
                      message: "Connector <controllerUuid>/<connectorId> was not found for the provided tenant"
                      requestId: "b1f6e6b0-1234-4abc-9def-000000000000"

  /organizations/schedules:
    post:
      tags: [Organizations]
      summary: Create or replace an organization-wide cap profile
      operationId: createOrganizationSchedule
      description: |
        Erfasst ein organisationsweites Cap-Profil für den anfragenden
        Mandanten (abgeleitet aus dem API-Schlüssel — keine `orgId` im Pfad
        oder Body).

        > **Noch nicht durchgesetzt.** Die Durchsetzung des organisationsweiten
        > Caps über die Standorte des Mandanten hinweg ist noch nicht aktiv
        > (Phase 3, verschoben). Profile werden nur für die zukünftige
        > Verwendung erfasst.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitProfileRequest"
            examples:
              example:
                value:
                  startTime: "2026-06-12T08:00:00Z"
                  endTime: "2026-06-12T18:00:00Z"
                  limitKw: 500.0
                  priority: 5
      responses:
        "200":
          description: Org-Profil erstellt/ersetzt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgScheduleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"

  /organizations/limits:
    get:
      tags: [Organizations]
      summary: List organization-wide cap profiles
      operationId: getOrganizationLimits
      description: |
        Listet alle organisationsweiten Cap-Profile für den anfragenden
        Mandanten mit berechnetem Status auf.

        > **Noch nicht durchgesetzt** — siehe `POST /organizations/schedules`.
      responses:
        "200":
          description: Org-Cap-Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgLimitsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"

  /clusters:
    post:
      tags: [Clusters]
      summary: Create a cluster
      operationId: createCluster
      description: |
        Erstellt einen Cluster, der mehrere Standorte unter einem optionalen
        gemeinsamen kW-Cap gruppiert. Alle `locationIds` müssen dem
        anfragenden Mandanten gehören.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterCreateRequest"
            examples:
              example:
                value:
                  name: "North Campus"
                  locationIds: ["3632155", "3632156"]
                  limitKw: 200.0
      responses:
        "201":
          description: Cluster erstellt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cluster"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
    get:
      tags: [Clusters]
      summary: List clusters
      operationId: listClusters
      description: Listet alle Cluster für den anfragenden Mandanten auf, neueste zuerst.
      responses:
        "200":
          description: Cluster
          content:
            application/json:
              schema:
                type: object
                properties:
                  clusters:
                    type: array
                    items:
                      $ref: "#/components/schemas/Cluster"
                  count:
                    type: integer
                    example: 2
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"

  /clusters/{clusterId}:
    get:
      tags: [Clusters]
      summary: Get a cluster's live status
      operationId: getCluster
      description: |
        Gibt den Cluster sowie einen `liveStatus`-Block zurück: tatsächliche
        gesamte kW-Last, Summe der Limits der Mitglieds-Standorte und
        pro Standort `{setLimitKw, effectiveLimitKw, actualKw}` nach
        proportionaler Skalierung
        (`scale = min(1, clusterLimitKw / sumLocationLimits)`).
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Cluster-Detail mit Live-Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/ClusterNotFound"
    patch:
      tags: [Clusters]
      summary: Update a cluster
      operationId: updateCluster
      description: |
        Aktualisiert einen Cluster teilweise. Es können beliebige der Felder
        `name`, `limitKw` (oder `null`, um das Cap zu entfernen),
        `locationIds` oder `status` (`ACTIVE`/`INACTIVE`) angegeben werden.
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterPatchRequest"
            examples:
              example:
                value:
                  limitKw: 250.0
      responses:
        "200":
          description: Aktualisierter Cluster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cluster"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/ClusterNotFound"
    delete:
      tags: [Clusters]
      summary: Delete a cluster
      operationId: deleteCluster
      description: Löscht den Cluster-Datensatz. Mitglieds-Standorte sind davon nicht betroffen.
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Cluster gelöscht
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
                  clusterId:
                    type: string
                    example: "clst_20260612_a1b2c3d4"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/ClusterNotFound"

  /clusters/{clusterId}/schedules:
    post:
      tags: [Clusters]
      summary: Apply a schedule to every location in a cluster
      operationId: applyClusterSchedule
      description: |
        Wendet denselben `LimitProfileRequest` auf jeden Standort im Cluster
        an (entspricht dem Aufruf von
        `POST /locations/{locationId}/schedules` für jedes Mitglied).
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitProfileRequest"
            examples:
              example:
                value:
                  startTime: "2026-06-12T08:00:00Z"
                  endTime: "2026-06-12T18:00:00Z"
                  limitKw: 50.0
                  priority: 5
      responses:
        "200":
          description: Zeitplan auf mindestens einen Standort angewendet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterScheduleResponse"
        "400":
          description: Cluster ist inaktiv, leer, oder der Request-Body ist ungültig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                clusterInactive:
                  summary: CLUSTER_INACTIVE
                  value:
                    error:
                      code: CLUSTER_INACTIVE
                      message: "Cluster clst_20260612_a1b2c3d4 is inactive"
                      requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
                clusterEmpty:
                  summary: CLUSTER_EMPTY
                  value:
                    error:
                      code: CLUSTER_EMPTY
                      message: "Cluster has no locations"
                      requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/FeatureNotEnabled"
        "404":
          $ref: "#/components/responses/ClusterNotFound"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Mandanten-spezifischer API-Schlüssel. Der Mandant wird aus dem Schlüssel abgeleitet — nie aus dem Request.

  parameters:
    LocationId:
      name: locationId
      in: path
      required: true
      schema:
        type: string
      example: "3632155"
    ControllerUuid:
      name: controllerUuid
      in: path
      required: true
      schema:
        type: string
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    ConnectorId:
      name: connectorId
      in: path
      required: true
      schema:
        type: string
      example: "1"
    ClusterId:
      name: clusterId
      in: path
      required: true
      schema:
        type: string
      example: "clst_20260612_a1b2c3d4"

  schemas:
    LimitProfileRequest:
      type: object
      required: [startTime, endTime, limitKw]
      properties:
        startTime:
          type: string
          format: date-time
          description: ISO-8601-UTC-Zeitstempel. Erforderlich.
          example: "2026-06-12T08:00:00Z"
        endTime:
          type: string
          format: date-time
          description: ISO-8601-UTC-Zeitstempel. Muss nach `startTime` liegen und in der Zukunft sein. Erforderlich.
          example: "2026-06-12T18:00:00Z"
        limitKw:
          type: number
          format: float
          exclusiveMinimum: 0
          description: Leistungslimit in kW. Muss größer als 0 sein. Erforderlich.
          example: 50.0
        priority:
          type: integer
          minimum: 0
          maximum: 10
          default: 0
          description: |
            Prioritätsstufe im OCPP-Stack-Stil, 0 (niedrigste) bis 10
            (höchste). Wird ein Profil mit einer Priorität übermittelt, die
            für dieses Ziel bereits existiert, wird dieses ersetzt.
          example: 5

    PermanentLimitRequest:
      type: object
      required: [limitKw]
      properties:
        limitKw:
          type: number
          format: float
          exclusiveMinimum: 0
          example: 100.0

    ProfileStatus:
      type: string
      enum: [SCHEDULED, ACTIVE, EXPIRED]

    LocationScheduleResponse:
      type: object
      properties:
        locationId:
          type: string
          example: "3632155"
        priority:
          type: integer
          example: 5
        limitKw:
          type: number
          example: 50.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"
        permanentLimitKw:
          type:
            - number
            - "null"
          example: 100.0
        effectiveLimitKw:
          type:
            - number
            - "null"
          example: 50.0

    ProfileEntry:
      type: object
      properties:
        priority:
          type: integer
          example: 5
        limitKw:
          type: number
          example: 50.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"

    LocationLimitsResponse:
      type: object
      properties:
        locationId:
          type: string
          example: "3632155"
        permanentLimitKw:
          type:
            - number
            - "null"
          example: 100.0
        effectiveLimitKw:
          type:
            - number
            - "null"
          example: 50.0
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/ProfileEntry"

    PermanentLimitResponse:
      type: object
      properties:
        locationId:
          type: string
          example: "3632155"
        permanentLimitKw:
          type: number
          example: 100.0
        effectiveLimitKw:
          type:
            - number
            - "null"
          example: 100.0

    ConnectorScheduleResponse:
      type: object
      properties:
        controllerUuid:
          type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        connectorId:
          type: string
          example: "1"
        limitKw:
          type: number
          example: 11.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"

    OrgScheduleResponse:
      type: object
      properties:
        tenantUuid:
          type: string
        priority:
          type: integer
          example: 5
        limitKw:
          type: number
          example: 500.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"
        note:
          type: string
          example: "Organization-wide cap enforcement is not yet active; this profile is recorded for future use."

    OrgProfileEntry:
      type: object
      properties:
        priority:
          type: integer
          example: 5
        limitKw:
          type: number
          example: 500.0
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ProfileStatus"

    OrgLimitsResponse:
      type: object
      properties:
        tenantUuid:
          type: string
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/OrgProfileEntry"
        note:
          type: string
          example: "Organization-wide cap enforcement is not yet active; this profile is recorded for future use."

    ClusterCreateRequest:
      type: object
      required: [name, locationIds]
      properties:
        name:
          type: string
          example: "North Campus"
        locationIds:
          type: array
          minItems: 1
          items:
            type: string
          example: ["3632155", "3632156"]
        limitKw:
          type:
            - number
            - "null"
          format: float
          exclusiveMinimum: 0
          description: Optionales clusterweites kW-Cap.
          example: 200.0

    ClusterPatchRequest:
      type: object
      properties:
        name:
          type: string
          example: "North Campus"
        limitKw:
          type:
            - number
            - "null"
          description: Auf `null` setzen, um das Cluster-Cap zu entfernen.
          example: 250.0
        locationIds:
          type: array
          minItems: 1
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    Cluster:
      type: object
      properties:
        clusterId:
          type: string
          example: "clst_20260612_a1b2c3d4"
        tenantUuid:
          type: string
        name:
          type: string
          example: "North Campus"
        locationIds:
          type: array
          items:
            type: string
          example: ["3632155", "3632156"]
        limitKw:
          type:
            - number
            - "null"
          example: 200.0
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ClusterLocationStatus:
      type: object
      properties:
        locationId:
          type: string
          example: "3632155"
        setLimitKw:
          type: number
          example: 100.0
        effectiveLimitKw:
          type: number
          example: 80.0
        actualKw:
          type: number
          example: 65.4

    ClusterLiveStatus:
      type: object
      properties:
        actualTotalKw:
          type: number
          example: 130.8
        clusterLimitKw:
          type:
            - number
            - "null"
          example: 200.0
        sumLocationLimits:
          type: number
          example: 200.0
        withinLimit:
          type: boolean
          example: true
        locations:
          type: array
          items:
            $ref: "#/components/schemas/ClusterLocationStatus"

    ClusterDetail:
      allOf:
        - $ref: "#/components/schemas/Cluster"
        - type: object
          properties:
            liveStatus:
              $ref: "#/components/schemas/ClusterLiveStatus"

    ClusterScheduleResponse:
      type: object
      properties:
        clusterId:
          type: string
          example: "clst_20260612_a1b2c3d4"
        applied:
          type: array
          items:
            allOf:
              - type: object
                properties:
                  locationId:
                    type: string
              - $ref: "#/components/schemas/LocationScheduleResponse"
        errors:
          type: array
          items:
            type: object
            properties:
              locationId:
                type: string
              error:
                $ref: "#/components/schemas/Error"
        totalLocations:
          type: integer
          example: 2

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "LOCATION_NOT_FOUND"
            message:
              type: string
              example: "Location 123 was not found for the provided tenant"
            requestId:
              type: string
              format: uuid

  responses:
    BadRequest:
      description: Ungültiger Request-Body oder Ziel ist inaktiv
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            invalidBody:
              summary: INVALID_REQUEST_BODY
              value:
                error:
                  code: INVALID_REQUEST_BODY
                  message: "limitKw must be a positive number"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
            targetInactive:
              summary: TARGET_INACTIVE
              value:
                error:
                  code: TARGET_INACTIVE
                  message: "Location 123 is not active"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
    Unauthorized:
      description: Fehlender, ungültiger oder abgelaufener API-Schlüssel
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            unauthorized:
              value:
                error:
                  code: UNAUTHORIZED
                  message: "Invalid or inactive API key"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
    FeatureNotEnabled:
      description: Mandant hat die Energy Management API nicht aktiviert
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            featureNotEnabled:
              value:
                error:
                  code: FEATURE_NOT_ENABLED
                  message: "The Energy Management API is not enabled for your account. Contact RiDERgy to enable this feature."
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
    LocationNotFound:
      description: Standort nicht gefunden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            locationNotFound:
              value:
                error:
                  code: LOCATION_NOT_FOUND
                  message: "Location 123 was not found for the provided tenant"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
    ClusterNotFound:
      description: Cluster nicht gefunden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            clusterNotFound:
              value:
                error:
                  code: CLUSTER_NOT_FOUND
                  message: "Cluster clst_20260612_a1b2c3d4 not found"
                  requestId: "b1f6e6b0-1234-4abc-9def-000000000000"
